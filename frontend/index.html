<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarePlus - Patient Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>CarePlus Hospital</h1>
            <p>Smart Patient Appointment Booking Portal</p>
            <div style="margin-top: 15px;">
                <a href="doctor.html" class="btn btn-primary" style="text-decoration: none; display: inline-block;">👉 Switch to Doctor Dashboard</a>
            </div>
        </header>
        
        <main>
            <section class="card">
                <div class="card-header">
                    <h2>Available Doctor Schedules</h2>
                    <button id="btnLoadSchedules" class="btn btn-primary">🔄 Refresh Slots</button>
                </div>
                <!-- 🔍 Real-Time Search & Filter Component -->
                <div style="margin-bottom: 20px;">
                    <label for="doctorSearchInput">🔍 Fast Search Doctor or Specialty:</label>
                    <input type="text" id="doctorSearchInput" placeholder="Type doctor name, specialty, or condition (e.g., Sneha, Oncologist, Cold)..." onkeyup="filterDoctorSchedules()">
                </div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Slot ID</th>
                                <th>Doctor Name</th>
                                <th>Available Time Window</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="schedulesBody">
                            <tr>
                                <td colspan="4" class="text-center">Loading available slots...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>

            <section class="card booking-card">
                <h2>Book Your Appointment Slot</h2>
                <form id="bookingForm">
                    <div class="form-group">
                        <label for="scheduleId">Doctor Slot ID:</label>
                        <input type="number" id="scheduleId" placeholder="e.g., 1" min="1" required>  
                    </div>
                    
                    <div class="form-group">
                        <label for="illnessSelect">Select Your Illness / Category:</label>
                        <select id="illnessSelect" required>
                            <option value="" disabled selected>-- Choose your condition --</option>
                            
                            <!-- Slots 2 & 7: Dr. Sneha Sharma & Dr. Ananya Reddy -->
                            <option value="Fever">Fever (General Medicine)</option>
                            <option value="Common Cold">Common Cold / Flu</option>
                            
                            <!-- Slots 1 & 8: Dr. Ramesh Kumar & Dr. Rajesh Joshi -->
                            <option value="Cancer">Cancer Consultation (Oncology)</option>
                            
                            <!-- Slot 3: Dr. Ramcar Kumar -->
                            <option value="Kids Fever">Kids Fever / Cold (Pediatrics)</option>
                            
                            <!-- Slot 4: Dr. Amit Mishra -->
                            <option value="Heart Checkup">Heart Specialist (Cardiology)</option>
                            
                            <!-- Slot 5: Dr. Priya Patel -->
                            <option value="Skin Rash">Skin Specialist (Dermatology)</option>
                            
                            <!-- Slot 6: Dr. Vikram Malhotra -->
                            <option value="Brain Injury / Nerve Pain">Brain Specialist (Neurology)</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="patientEmail">Your Email Address:</label>
                        <input type="email" id="patientEmail" placeholder="e.g., patient@gmail.com" required>
                    </div>
                    <button type="submit" class="btn-success">Confirm Secure Booking</button>
                </form>
                
                <div id="messageBox" class="message-box hidden"></div>
            </section>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
