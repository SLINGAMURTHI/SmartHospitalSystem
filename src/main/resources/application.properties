# ===================================================================
# 1. Database Configuration (MySQL Connection)
# ===================================================================
server.port=8088
spring.datasource.url=jdbc:mysql://localhost:3306/hospital_db?createDatabaseIfNotExist=true
spring.datasource.username=root
# Change the password below to match your own local MySQL password!
spring.datasource.password=root
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ===================================================================
# 2. Redis Configuration (Performance Cache Engine)
# ===================================================================
spring.data.redis.host=localhost
spring.data.redis.port=6379

# ===================================================================
# 3. Email Configuration (SMTP Gateway Settings)
# ===================================================================
# This block instantly provides the JavaMailSender bean and clears your service error!
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your_email_address@gmail.com
spring.mail.password=your_gmail_app_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
# Fixes the authorization key permanently for development
# Fixes the authorization key permanently for development
spring.security.user.name=admin
spring.security.user.password=HospitalAdmin2026!

# Sets the local application cache expiration window to 10 minutes
spring.cache.redis.time-to-live=600000
spring.cache.cache-names=schedules

# Prevents saving empty or null records into memory tracking
spring.cache.redis.cache-null-values=false

# Disable the mail component ping check so it stops printing connection warnings
management.health.mail.enabled=false


# Overrides system paths to prevent backslash character profile parsing crashes
logging.file.path=C:/Users/ADMIN/eclipse-workspace/SmartHospitalSystem/logs
management.endpoints.web.exposure.include=health,metrics
management.endpoint.health.show-details=always

spring.mvc.cors.allowed-origins=*

#spring.mvc.cors.allowed-origins=https://slingamurthi.github.io